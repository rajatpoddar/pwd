version: "3.9"

services:
  password-manager:
    build: .
    container_name: password_manager
    restart: unless-stopped
    ports:
      - "7730:7730"
    volumes:
      - ./data:/app/data        # persist passwords & PIN outside container
    environment:
      - FLASK_ENV=production
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:7730/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
